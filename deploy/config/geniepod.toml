# GeniePod system configuration
# Installed to /etc/geniepod/geniepod.toml

data_dir = "/opt/geniepod/data"

[core]
port = 3000
bind_host = "127.0.0.1"           # Safer default. Use "0.0.0.0" only behind a trusted gateway/firewall.
ha_token = ""                     # Only needed when Home Assistant service is enabled below. Or set HA_TOKEN env var.
llm_model_name = "qwen"           # For prompt optimization. Options: nemotron-4b, tinyllama, llama, qwen, phi
                                  # alpha.9 default: Qwen3-4B Q4_K_M + genie-ai-runtime.
                                  # Phi-4-mini fallback (issue #44):
                                  #   1) deploy/setup-jetson.sh --model phi-4-mini
                                  #   2) flip the two lines below:
                                  #        llm_model_name = "phi"
                                  #        llm_model_path = "/opt/geniepod/models/phi-4-mini-instruct-q4_k_m.gguf"
                                  #   3) update GENIEPOD_LLM_MODEL in the active LLM
                                  #      systemd unit (genie-ai-runtime.service for the
                                  #      default, or genie-llm.service for the llama.cpp
                                  #      fallback)
                                  #   4) sudo systemctl restart <active-llm-unit> genie-core
                                  # (see ARCHITECTURE.md "Current Transitional Adapters".)
whisper_model = "/opt/geniepod/models/ggml-small.bin"   # alpha.5 default — with the
                                  # long-running whisper-server (genie-whisper.service)
                                  # this model stays resident in iGPU memory, so per-call
                                  # STT is ~500 ms on Orin Nano (good for conversational
                                  # accuracy). Swap to ggml-tiny.bin (~100 ms, weaker
                                  # accuracy) for max responsiveness, or ggml-base.bin
                                  # (~200 ms) for a middle ground. Keep the genie-whisper
                                  # systemd unit's GENIEPOD_WHISPER_MODEL in sync.
whisper_port = 8178               # alpha.5: long-running whisper-server via
                                  # genie-whisper.service. Model stays in GPU memory
                                  # so per-utterance latency is ~50 ms instead of ~1.5 s
                                  # cold-start. Set to 0 to fall back to spawning
                                  # whisper-cli per call (debugging or no-server hosts).
whisper_cli_path = "/opt/geniepod/bin/whisper-cli"
stt_language = "en"               # Whisper decoder hint. Forcing "en" uses the
                                  # English-only decoder, which is noticeably more
                                  # accurate for English speech than "auto" (which
                                  # runs the multilingual decoder). Set to "auto" or
                                  # a different code ("es", "de", "zh", ...) for
                                  # multilingual / non-English installs.
piper_model = "/opt/geniepod/voices/en_US-amy-medium.onnx"
piper_path = "/opt/geniepod/piper/piper"
piper_pipe_mode = false           # true = long-running subprocess (lower latency).
max_history_turns = 20
expected_runtime_contract_hash = ""  # Optional: pin after a known-good boot to detect prompt/tool/policy drift.
audio_device = "auto"             # CAPTURE/microphone device.
                                  # Auto-detect: prefers Tegra APE (LyraT/I2S2) if routed,
                                  # falls back to USB audio, then card 0. Override examples:
                                  #   "plughw:APE,0"  — LyraT/I2S2 (see doc/lyrat-jetson-audio.md)
                                  #   "plughw:0,0"   — first card
                                  #   "plughw:2,0"   — explicit USB card index
audio_output_device = "auto"      # PLAYBACK/speaker device for TTS output.
                                  # Auto-detect: prefers USB audio (headphone/headset),
                                  # then Tegra HDA (HDMI / 3.5 mm), then "default".
                                  # NEVER auto-resolves to the LyraT/APE card because the
                                  # LyraT firmware leaves the DAC side undriven. Override
                                  # for explicit routing:
                                  #   "plughw:1,0"   — USB headphone on card 1
                                  #   "default"      — ALSA system default sink
                                  #   "hdmi:CARD=tegrahda,DEV=0" — HDMI named device
audio_sample_rate = 24000         # Match the AHUB's I2S2 Sample Rate (24 kHz on LyraT
                                  # — see genie-audio-init for the wire-level rate
                                  # quirk). Capturing at the native rate avoids the
                                  # plughw resampler, which was observed to *not*
                                  # throttle output to real time when asked to
                                  # downsample 24 kHz → 16 kHz on this device
                                  # (a 3-second `arecord -r 16000 -d 3` finished in
                                  # ~1 s wall-clock). whisper-server resamples to
                                  # 16 kHz internally so STT is unaffected.
audio_denoiser = "deepfilternet"  # Capture-side noise reduction backend. Options:
                                  #   "deepfilternet" — neural denoiser (alpha.7, issue #12).
                                  #                     Handles non-stationary noise
                                  #                     (fan cycling, typing, background
                                  #                     voices) without a noise profile.
                                  #                     Run setup-jetson.sh to fetch the
                                  #                     binary into deep_filter_path.
                                  #   "sox"           — alpha.6 baseline; spectral
                                  #                     subtraction against a profile
                                  #                     captured in setup-jetson.sh,
                                  #                     plus compand quiet-speech lift.
                                  #   "none"          — bandpass + compand + normalize only.
                                  # Falls back to "sox" then "none" at runtime if the
                                  # configured backend's binary is missing.
deep_filter_path = "/opt/geniepod/bin/deep-filter"
deep_filter_atten_lim_db = 100.0  # DeepFilterNet attenuation limit (--atten-lim). 100.0 =
                                  # full denoising (upstream default). Lower values mix
                                  # the noisy signal back in — drop to ~30 if DFN
                                  # over-suppresses quiet phonemes.
post_tts_silence_ms = 1500        # Half-duplex gate (issue #15): ms to wait after aplay
                                  # exits before allowing the next mic capture. Lets the
                                  # ALSA hardware playback buffer drain and the speaker/
                                  # room reverb decay below the whisper-server no-speech
                                  # threshold — without it the next cycle's recording
                                  # picks up the assistant's own TTS and whisper
                                  # transcribes the assistant's voice as the next "user"
                                  # utterance. Set to 0 on installs with full physical
                                  # isolation (headphones / headset).
voice_enabled = true              # Voice mode on by default in alpha.5 (push-to-talk).
                                  # Set false on hosts without whisper/piper installed.
voice_record_secs = 3             # Seconds to record per voice interaction. Most
                                  # household commands ("what time is it", "turn on
                                  # kitchen light") fit in 3 s; raise if you regularly
                                  # ask longer multi-clause questions.
voice_continuous = true           # After response, auto-listen for follow-up without re-wake.
voice_continuous_secs = 3         # Shorter recording for follow-up conversation.
llm_model_path = "/opt/geniepod/models/Qwen3-4B-Q4_K_M.gguf"  # For GPU time-sharing in voice mode.
                                  # Phi-4-mini fallback (issue #44):
                                  # llm_model_path = "/opt/geniepod/models/phi-4-mini-instruct-q4_k_m.gguf"
wakeword_script = ""              # Empty = push-to-talk (alpha.5 default).
                                  # Set to "/opt/geniepod/bin/genie-wake-listen.py" once
                                  # wake-word detection is validated for your install.

# Optional per-language Piper voices for multilingual speech output:
# [core.voice_tts_models]
# es = "/opt/geniepod/voices/es_ES-sharvard-medium.onnx"
# de = "/opt/geniepod/voices/de_DE-thorsten-medium.onnx"
# zh = "/opt/geniepod/voices/zh_CN-huayan-medium.onnx"

# Optional speaker-identity provider for voice memory context:
# [core.speaker_identity]
# enabled = true
# provider = "local_biometric"   # "none", "fixed", or "local_biometric"
# fixed_name = "Jared"
# fixed_confidence = "high"      # "low", "medium", or "high"
# local_profile_dir = "/opt/geniepod/data/speakers"
# local_min_score = 0.82
# Enroll with: genie-ctl speaker enroll-live Jared

# Runtime load policy for native skills. Defaults are audit-only so existing
# local skills keep loading; enable these after manifests/signatures are ready.
# [core.skill_policy]
# require_manifest = false
# require_signature = false
# denied_permissions = ["network.raw", "filesystem.write"]

# Optional per-origin tool policy. Defaults are allow unless a rule exists.
# Use "*" as a wildcard origin or tool name. Deny rules override allow rules.
# [core.tool_policy]
# enabled = true
# allowed_tools_by_origin = { voice = ["get_time", "get_weather", "memory_recall", "home_status", "home_control"] }
# denied_tools_by_origin = { telegram = ["play_media"], "*" = [] }

# Final actuation safety gate for physical home-control execution:
# [core.actuation_safety]
# enabled = true
# min_target_confidence = 0.78
# min_sensitive_confidence = 0.90
# deny_multi_target_sensitive = true
# require_available_state = true
# allowed_origins = ["voice", "dashboard", "api", "telegram", "repl", "confirmation"]
# max_actions_per_minute = 12
# max_actions_per_minute_by_origin = { telegram = 3, voice = 8 }

[governor]
poll_interval_ms = 5000
night_start_hour = 23
day_start_hour = 6
night_model_swap = false     # Set true to enable 9B model at night (opt-in).

[governor.pressure]
stop_optins_mb = 500         # Stop Nextcloud/Jellyfin below this.
reduce_context_mb = 300      # Reduce LLM context under memory pressure.
swap_stt_mb = 200            # Downgrade to Whisper tiny.
zram_mb = 100                # Enable 2 GB zram swap (last resort).

[health]
interval_secs = 30
alert_enabled = false
alert_webhook_url = ""            # Optional local notifier endpoint.

# Uncomment to enable Telegram long-poll chat integration:
# [telegram]
# enabled = true
# bot_token = ""                   # Or set TELEGRAM_BOT_TOKEN env var.
# api_base = "https://api.telegram.org"
# poll_timeout_secs = 30
# allowed_chat_ids = [123456789]   # Recommended allowlist for private use.
# allow_all_chats = false
#
# Voice-message ingestion (issue #42). Reuses the configured whisper-server
# (core.whisper_port > 0) or whisper-cli; needs `ffmpeg` on $PATH for the
# OGG/Opus → 16 kHz mono WAV transcode.
# Phase 2 (reply_as_voice) reuses `core.piper_path` + `core.piper_model`
# to synthesize the reply, then ffmpeg encodes WAV → OGG/Opus and the bot
# uploads via Telegram `sendVoice`. Falls back to text on any failure.
# [telegram.voice]
# enabled = false                  # Off by default — opt-in.
# max_voice_duration_secs = 60     # Hard limit; longer messages are rejected.
# delete_temp_audio = true         # Remove /tmp/geniepod-tg-voice-*.{ogg,wav} after handling.
# ffmpeg_path = "ffmpeg"           # Override if ffmpeg isn't on PATH.
# reply_as_voice = false           # Phase 2 of #42 — voice-out via sendVoice.
# max_reply_chars = 800            # Replies longer than this fall back to text
#                                  # so we don't blow the sendVoice 1 MB cap.
# max_parallel_voice = 2           # Issue #77: how many voice pipelines may run
#                                  # at once. Text-only updates are not gated.
#                                  # Bump if the host has spare CPU and a
#                                  # dedicated whisper-server.

# Public web search tool. Default provider is DuckDuckGo Instant Answer, which needs no API key.
# For a private/local path, run SearXNG and set provider = "searxng" with base_url.
[web_search]
enabled = true
provider = "duckduckgo"          # "duckduckgo" or "searxng"
base_url = ""                    # Example for SearXNG: "http://127.0.0.1:8888"
allow_remote_base_url = false    # Keep SearXNG local unless explicitly changed.
timeout_secs = 8
max_results = 3
cache_enabled = true
cache_ttl_secs = 900
cache_max_entries = 64

# Uncomment to enable an ESP32-C6 UART Thread/Matter sidecar for GenieClaw-local diagnostics or control:
# [connectivity]
# enabled = true
# transport = "esp32c6_uart"
# device = "esp32c6"
#
# [connectivity.esp32c6_uart]
# device_path = "/dev/ttyTHS1"     # Use /dev/ttyACM0 or /dev/ttyUSB0 for many dev boards.
# baud_rate = 115200
# reset_gpio = 24
# hardware_flow_control = false
# mtu_bytes = 1024
# response_timeout_ms = 250

[services.core]
url = "http://127.0.0.1:3000/api/health"
systemd_unit = "genie-core.service"

[services.llm]
url = "http://127.0.0.1:8080/health"
systemd_unit = "genie-ai-runtime.service"
backend = "genie_ai_runtime"      # Default on Jetson. OpenAI-compatible genie-ai-runtime (:8080).
                                  # Set backend = "llama_cpp" + systemd_unit = "genie-llm.service"
                                  # to roll back to the legacy llama.cpp server path.
                                  # Accepts hyphenated aliases too: "llama-cpp" / "genie-ai-runtime".

[services.api]
url = "http://127.0.0.1:3080/api/status"
systemd_unit = "genie-api.service"

# Uncomment to enable Home Assistant integration:
# [services.homeassistant]
# url = "http://127.0.0.1:8123/"
# systemd_unit = "homeassistant.service"

# Uncomment after enabling via first-boot wizard:
# [services.nextcloud]
# url = "http://127.0.0.1:8180/status.php"
# systemd_unit = "nextcloud.service"

