# GeniePod development configuration
# Use this on your dev machine (no /opt/geniepod needed):
#   GENIEPOD_CONFIG=deploy/config/geniepod.dev.toml cargo run --bin genie-core

data_dir = "./data"

[agent]
runtime_profile = "laptop"         # Dev default; Jetson production uses "jetson".
context_window_tokens = 4096       # Keep provider/harness tests honest on non-Jetson hosts.
ai_runtime_boundary = "external_runtime"
voice_runtime_boundary = "disabled"
home_runtime_boundary = "transitional_adapter"

[optional_ai_provider]
enabled = false
provider = "open_ai_compatible"
base_url = ""
api_key_env = "GENIEPOD_AI_PROVIDER_API_KEY"
context_window_tokens = 4096
allow_remote_base_url = false

[core]
port = 3000
bind_host = "127.0.0.1"
ha_token = ""                      # Only needed when Home Assistant service is enabled below.
llm_model_name = "tinyllama"        # Change to "phi" on Jetson
whisper_model = "./models/whisper-small.bin"
whisper_port = 0
stt_language = "auto"
piper_model = "./models/piper-en.onnx"
piper_pipe_mode = false
max_history_turns = 20
expected_runtime_contract_hash = ""  # Optional: pin after a known-good boot.

# [core.voice_tts_models]
# es = "./models/piper-es.onnx"
# de = "./models/piper-de.onnx"
# zh = "./models/piper-zh.onnx"

