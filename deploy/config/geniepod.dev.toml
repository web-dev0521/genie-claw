# max_actions_per_minute_by_origin = { telegram = 3, voice = 8 }

[web_search]
enabled = true
provider = "duckduckgo"
base_url = ""
allow_remote_base_url = false
timeout_secs = 8
max_results = 3
cache_enabled = true
cache_ttl_secs = 900
cache_max_entries = 64

[governor]
poll_interval_ms = 5000
night_start_hour = 23
day_start_hour = 6

[governor.pressure]
stop_optins_mb = 500
reduce_context_mb = 300
swap_stt_mb = 200
zram_mb = 100

[health]
interval_secs = 30
alert_enabled = false
alert_webhook_url = ""

[services.core]
url = "http://127.0.0.1:3000/api/health"
systemd_unit = "genie-core.service"

[services.llm]
url = "http://127.0.0.1:8080/health"
systemd_unit = "genie-llm.service"
backend = "llama_cpp"              # Dev default (x86/macOS): local llama.cpp `--server` on :8080.
# backend = "genie_ai_runtime"      # Jetson-tuned runtime (dev machines typically stay on llama.cpp).

# Uncomment to enable Home Assistant integration during development:
# [services.homeassistant]
# url = "http://127.0.0.1:8123/"
# systemd_unit = "homeassistant.service"
